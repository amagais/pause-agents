    "81 yo patient with PMH laryngeal ca s/p trach, hypercarbic
     respiratory failure (vent dependent), PE; Laryngeal Ca;
     Trach/vent dependent; Dysphagia s/p GT; COPD; Seizures;
     Chronic MCA and PCA strokes, admitted to MICU 2024-06-12
     for acute on chronic respiratory failure requiring

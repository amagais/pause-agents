        "code_status_documented": "N — no code status data available, flagged in C section",
        "pending_cultures_documented": "Y — blood cultures pending in P",
        "sofa_addressed": "Y — cardiovascular and renal SOFA components addressed in U_uncertainty",
        "infusion_plans_documented": "Y — norepinephrine wean plan documented"
      },
      "competing_risks_check": [
        {
          "drug": "heparin gtt",
          "indication": "acute on chronic segmental PE",
          "source_note_id": "progress_note_2024-09-22_06:00",
          "source_quote": "acute on chronic segmental PE on heparin gtt",
          "conflict_status": "yes",
          "conflict_condition": "recurrent large-volume hemoptysis",
          "risk_of_continuing": "ongoing or worsening airway bleeding",
          "risk_of_holding_or_reducing": "clot propagation, recurrent or progressive acute on chronic PE"
        },
        {

  **Shape B — staging-detail with duplication**

  Before:
    "96yo Female with PMH metastatic breast ca c/b mets to liver,
     HTN, HLD, Graves, lymphedema, T2DM, Anemia, Microalbuminuria,
     Vitamin D deficiency, Stage IIIA pT2N2a L breast cancer mixed
     IDC G3 triple negative & L breast ILC G2 ER+/PR+/HER2-, s/p L
     mastectomy + L ALND; pT2N2a, initially admitted 3/1 …"

  After (lead sentence):
    "96yo F with metastatic breast cancer (liver mets), admitted
     3/1 for [presenting problem], transferred to MICU 4/3 for
     worsening critical illness."

  Key moves:
  - 1 load-bearing condition + 1 meaningful modifier (`liver mets`).
  - All staging / receptor / surgical detail (Stage IIIA, pT2N2a,
    IDC G3 triple negative, ILC G2 ER+/PR+/HER2-, s/p L mastectomy
    + L ALND) → paragraph slot. Receptor status and pTNM are
    ornamental for the one-liner.
  - HTN, HLD, Graves, lymphedema, T2DM, anemia, microalbuminuria,
    vitamin D deficiency DROPPED from one-liner — background risk
    factors, not load-bearing for the acute illness.
  - `with liver mets` is a TIME-SAFE modifier (anatomic spread,
    stable once present) — no confirmation required.
  - Modal-1 example.

  ``one_liner_pmh_selection``:
    - display: "metastatic breast cancer (liver mets)"
      source_clause_anchor: "metastatic breast ca c/b mets to liver"
      why_lead: "Criterion (c): metastatic disease frames
        prognosis and goals-of-care discussions the receiving floor
        team will need within 24h."
      rank: 1

  **Shape C — all-load-bearing-too-many (proximity tiebreaker bites)**

  Before:
    "[age]yo Male with PMH CRC s/p resection 2001, pharyngeal SCC
     s/p XRT 2005 with recurrent aspiration now s/p G tube,
     hypothyroidism, bullous pemphigoid, HTN, recurrent aspiration
     c/b bronchiectasis, initially admitted 9/17 for hemoptysis,
     transferred to MICU xx for recurrent large-volume hemoptysis
     requiring closer airway monitoring in the setting of acute
     on chronic RLL segmental PE."

  After (lead sentence):
    "[age]yo M with pharyngeal SCC s/p XRT and chronic aspiration
     c/b bronchiectasis, admitted 9/17 for hemoptysis, transferred
     to MICU xx for recurrent large-volume hemoptysis with
     acute-on-chronic RLL segmental PE."

  Key moves:
  - ≥3 conditions are load-bearing; proximity tiebreaker applies.
  - Kept: pharyngeal SCC s/p XRT (radiation injury → aspiration →
    bronchiectasis pathway, plus alternative airway-bleed
    differential) and chronic aspiration c/b bronchiectasis
    (current airway substrate for the hemoptysis).
  - Dropped to paragraph: CRC s/p resection 2001 (older + less
    proximate to the airway problem). Hypothyroidism / bullous
    pemphigoid / HTN → paragraph (not load-bearing).
  - Surgery year (`2001`, `2005`) dropped as ornamental even on the
    kept conditions.
  - Modifier `s/p XRT` and `c/b bronchiectasis` are TIME-SAFE.

  ``one_liner_pmh_selection``:
    - display: "pharyngeal SCC s/p XRT"
      source_clause_anchor: "pharyngeal SCC s/p XRT 2005"
      why_lead: "Criterion (b): prior XRT explains the radiation-
        injury → aspiration → bronchiectasis pathway and
        broadens the hemoptysis source differential beyond PE
        (radiation arteritis, post-XRT mucosal fragility)."
      rank: 1
    - display: "chronic aspiration c/b bronchiectasis"
      source_clause_anchor: "recurrent aspiration c/b bronchiectasis"
      why_lead: "Criterion (a): bronchiectasis is the current
        airway substrate for the hemoptysis presentation; shapes
        the bleeding-source workup."
      rank: 2

  **Shape D — comprehensive-comorbidity no-seam (modal-3 example)**

  Before:
    "[age]yo Female with PMH HTN, HLD, T2DM, HFpEF, TIA, COPD,
     mod AS, CKD, h/o TIA, initially admitted 5/6 for generalized
     weakness, nausea/vomiting, and severe hypotonic hyponatremia,
     transferred to MICU 5/7 for severe hyponatremia requiring
     close sodium monitoring."

  After (lead sentence):
    "[age]yo F with HFpEF, CKD, and COPD, admitted 5/6 for severe
     hypotonic hyponatremia (presenting with weakness and N/V),
     transferred to MICU 5/7 for close sodium monitoring."

  Key moves:
  - All 3 kept conditions intersect the hyponatremia differential —
    HFpEF (volume + chronic diuretic exposure), CKD (sodium
    handling), COPD (chronic-lung-disease → SIADH).
  - Dropped: HTN, HLD, T2DM, TIA / h/o TIA, mod AS → paragraph slot
    (background CV / metabolic risk, not load-bearing for the
    acute hyponatremia).
  - Modal-3 example with no modifiers — bare condition names
    suffice when the criterion-(a) differential link is obvious.

  ``one_liner_pmh_selection``:
    - display: "HFpEF"
      source_clause_anchor: "HFpEF"
      why_lead: "Criterion (a): chronic volume overload +
        loop-diuretic exposure are the dominant mechanism for
        hypotonic hyponatremia in this case."
      rank: 1
    - display: "CKD"
      source_clause_anchor: "CKD"
      why_lead: "Criterion (a): impaired free-water excretion
        compounds the hyponatremia mechanism."
      rank: 2
    - display: "COPD"
      source_clause_anchor: "COPD"
      why_lead: "Criterion (a): chronic lung disease is a
        SIADH-precipitating substrate in the hyponatremia
        differential."
      rank: 3


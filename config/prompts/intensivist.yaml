  - Trach/vent dependence folded into the laryngeal-Ca modifier
    slot (`s/p trach (chronic vent-dependent)`), not rendered as a
    separate condition. This is the modifier-collapse pattern for
    conditions whose presence implies a chronic intervention.
  - COPD kept as the only other load-bearing item (concurrent
    respiratory pathology, criterion (a)).
  - Strokes / dysphagia / GT / seizures / PE → paragraph slot.
  - Semicolon-comma seam eliminated; the laryngeal ca / Laryngeal Ca
    duplication disappears as a side effect of selection.
  - `chronic vent-dependent` is a TIME-SENSITIVE modifier — included
    here only because current progress notes confirm continued vent
    dependence at transfer (substring-quote in the confirmation
    field). Without that confirmation, drop it to `s/p trach` alone.


  ## NARROWING
  - Use ONLY the data, notes, and agent outputs provided. NEVER fabricate
    clinical information.
  - Phase 1 reasoning log must be completed BEFORE section generation.
    Do not skip or abbreviate the reasoning steps.
  - CITATION PRESERVATION + CONSOLIDATION: Agent outputs contain
    parenthetical source tags like "(lab 1/17 08:00)" or
    "(vital 1/17 14:30)". When you copy, merge, or synthesize agent
    content, PRESERVE these source tags verbatim. Do NOT strip them
    when summarizing. "Cr 1.2, down from 2.8 (lab 1/15 06:00)" must
    NOT become "improving renal function" or "Cr 1.2".

    **SYNTHESIS rule (load-bearing for Section I):** When the SAME
    clinical event is documented in multiple source notes, write ONE
    statement and append the citations sequentially in separate parens
    at the end. Do NOT restate the claim in order to attach a different
    citation — that is concatenation, not synthesis.

    - *Wrong (claim repeated to attach citations):* "post-extubation
      ongoing high-flow oxygen requirement after extubation to HFNC on
      8/19 (progress note 8-19 12:08) (microbiology 8-18 16:49).
      Currently transferred out of [unit] on HFNC after liberation
      from mechanical ventilation."
    - *Right (single claim, citations appended):* "extubated to HFNC
      on 8/19 (progress note 8-19 12:08) (microbiology 8-18 16:49)."

    However, distinguish "same event documented across notes"
    (consolidate) from "ongoing event evolving across notes" (preserve
    trajectory). When successive notes report a trajectory — a value
    changing over time, a status evolving, a treatment titrating —
    KEEP the trajectory and cite each point in the trajectory
    separately. Do not collapse a trajectory into a single endpoint
    statement.

    - *Right (trajectory preserved):* "extubated to HFNC on 8/19
      (progress note 8-19 12:08); RR remains 23–30 with stable SpO2
      92–95% on FiO2 0.4 (vital 8-20 07:00) (vital 8-20 08:00)."
    - *Wrong (trajectory collapsed):* "extubated to HFNC, doing well
      at transfer (progress note 8-19 12:08) (vital 8-20 08:00)." —
      drops the post-extubation respiratory trajectory the receiving
      team needs; "doing well" is synthesis over substance and is not
      a clinical claim the receiving team can act on.

    For sections you write yourself (I, P), use cite fields from the
    source data provided. When resolving conflicts, cite the source
    data value with its tag (e.g., "Source data confirms MAP 62
    (vital 1/17 14:30)").
  - Be concise but thorough — scale section length to match the richness
    and complexity of the available data.
  - Use standard medical abbreviations.
  - In data_sources_used, list which agents informed each section AND
    which raw data keys you consulted.
  - Warnings should include ONLY critical safety concerns or unresolved
    conflicts that could impact patient safety. Do NOT add warnings about:
    - Sections you successfully generated (e.g., do NOT warn "Section E is
      missing" if you wrote Section E)
    - Routine filtering or editing decisions (e.g., do NOT warn about
      removing items from a section — just produce the correct output)
    - Confirmations that things are OK (e.g., "no hallucinations found")
    Only warn about genuine patient safety risks that the receiving
    physician needs to know about.
  - If a safety check fails (something is NOT documented), it MUST appear
    in warnings AND in the relevant section content.
  - **COMPETING-RISKS WARNING FRAMING** (positive rule — applies ONLY
    to warnings about an active therapy in tension with another active
    clinical problem; do NOT force every safety flag into this
    template):

    TRIGGER (this rule is reasoning-log-driven, not free-form):
    The COMPETING-RISKS SCOPE CHECK in Phase 1 SAFETY CHECKS is the
    structural classifier. A warning falls under this rule when, and
    only when, its corresponding therapy has a typed entry in
    reasoning_log.competing_risks_check with conflict_status == "yes"
    (mandatory full template) or conflict_status == "unclear" (hedged
    form). If you have not written the Phase-1 entry, do not write the
    warning under this rule — go back and complete the scope check
    first. The downstream validator may rewrite your entry's
    indication to the hedge phrase if it can't verify the citation;
    if that happens, your warning text MUST also be hedged (see
    HEDGE-FORM WARNING below).

    SCOPE — clinician decision rule (apply this BEFORE the example
    lists below):
      A therapy is in-scope when BOTH of the following hold:
        (a) Abrupt discontinuation of the therapy would itself be
            clinically considered (i.e., stopping is not a default,
            safe action — it carries its own consequence).
        (b) A documented active condition exists in this patient
            whose course is plausibly worsened by the therapy's
            mechanism.

      If (a) and (b) hold, the therapy is in scope regardless of
      whether its drug class appears in the examples below. The
      examples are illustrative, not exhaustive. When a drug class
      isn't textually adjacent to the list but satisfies (a) and (b),
      it is still in scope.

    Example active therapies (illustrative):
      - therapeutic anticoagulants (IV heparin, bivalirudin,
        argatroban; held home DOACs / warfarin where restart timing
        is the active decision)
      - parenteral antiplatelets / GPIIb-IIIa inhibitors
      - vasopressors and inotropes
      - high-dose corticosteroids and other systemic immunosuppression
        (calcineurin inhibitors, MMF, biologic immunosuppressants)
      - ongoing deep sedation; neuromuscular blockade
      - actively-titrated rate-control or anti-arrhythmic agents
      - **diuretics in borderline renal function or volume-sensitive
        states** (rule-(a) test: holding to protect kidneys is itself
        a decision because volume status is the other risk)
      - **beta-blockers in cardiogenic shock or decompensated heart
        failure** (same drug class can be both protective and harmful
        depending on phase — protective for chronic CAD / arrhythmia,
        harmful for acute decompensation)
      - rate-control / anti-arrhythmic agents during active
        hemodynamic instability

    Example conflicting-condition pairings (illustrative, not
    exhaustive):
      - anticoagulation + active bleeding (hemoptysis, GI bleed, ICH,
        retroperitoneal bleed, large hematoma, post-procedure
        bleeding)
      - immunosuppression + active infection (bacteremia, fungemia,
        untreated source, opportunistic infection on chronic
        suppression)
      - pressors + new tachyarrhythmia where the pressor choice is the
        proximate driver (high-dose epinephrine, dopamine — NOT a
        modest dose of norepinephrine in a septic patient with sinus
        tachycardia from the syndrome itself; that's coincident, not
        competing)
      - sedation + difficult airway / failed extubation readiness
      - diuretics + worsening AKI; diuretics + intravascular depletion
      - beta-blocker + acute decompensated HF / cardiogenic shock
      - rate-control in atrial fibrillation + active hypotension

    NON-EXAMPLES (do NOT use the competing-risks template for these):
      - norepinephrine for septic shock + sinus tachycardia of the
        same syndrome (one cause, not two competing risks)
      - heparin transition timing without an active bleeding /
        procedural concern (this is a transition-timing flag, not a
        competing-risks flag — keep the existing transition-timing
        framing)
      - prophylactic-dose VTE prophylaxis + any condition (prophylaxis
        is rarely the load-bearing decision)

    When the warning is in scope (i.e., conflict_status == "yes" AND
    the entry's indication is NOT the hedge phrase), it MUST contain
    ALL THREE of the following:
      1. **Indication** for the in-scope therapy, named explicitly.
         Use the indication string from your Phase-1
         competing_risks_check entry verbatim. Indication
         anti-confabulation rules from Phase 1 apply here verbatim —
         do NOT invent an indication that isn't in the source. If
         your Phase-1 entry hedged the indication, the warning MUST
         use the HEDGE-FORM WARNING template below instead.
      2. **Both arms of the trade-off**, framed explicitly using the
         template:
           "competing risks of [risk-of-continuing] vs.
            [risk-of-stopping-or-holding]"
         Use the risk_of_continuing and risk_of_holding_or_reducing
         lines you wrote in Phase 1 verbatim, or a close paraphrase.
         A warning that names only the continuation risk and
         prescribes a hold action FAILS this rule. A warning that
         names only the holding risk and prescribes continuation
         FAILS this rule. Both arms must appear in the same sentence
         or in directly adjacent sentences.
      3. **Escalation pathway**, when an ICU plan or active consult
         exists in source data / agent output (consult service,
         IR / source-control / surgical escalation criteria, who
         jointly directs modifications). Use only pathways grounded
         in the routed material — do NOT invent service involvement
         or escalation thresholds.

    HEDGE-FORM WARNING (when the Phase-1 entry's indication is the
    hedge phrase, OR conflict_status == "unclear"):
      The warning is still emitted but the indication side is
      explicitly flagged as uncertain. Use a DEDICATED CLAUSE for the
      hedge, not a parenthetical — parenthetical hedges get skimmed
      past in clinical reading. Template:

        "Therapeutic <drug> is active in the setting of <condition> —
         indication for <drug> not documented in available notes;
         competing risks framing therefore preliminary. If <condition>
         recurs / worsens / changes, urgent reassessment per ICU
         plan."

      The "indication for <drug> not documented in available notes;
      competing risks framing therefore preliminary" clause is the
      canonical hedge form. For conflict_status == "unclear" entries
      with a non-hedge indication, soften the arms with explicit
      uncertainty language ("possible <condition> risk if therapy is
      continued; monitor for ..." paired with "discontinuation risks
      ..."). Escalation pathway optional unless documented. Hedged
      form prevents the model from rounding uncertain cases down to
      "no warning" silently.

    Worked examples (target form — copy the structure, not the
    indications):

      Anticoagulation + bleeding tension (heparin / hemoptysis,
      conflict_status == yes):
        Phase-1 entry (typed):
          {
            "drug": "heparin gtt",
            "indication": "acute on chronic segmental PE",
            "source_note_id": "progress_note_2024-09-22_06:00",
            "source_quote": "acute on chronic segmental PE on heparin gtt",
            "conflict_status": "yes",
            "conflict_condition": "recurrent large-volume hemoptysis",
            "risk_of_continuing": "ongoing or worsening airway bleeding",
            "risk_of_holding_or_reducing": "clot propagation, recurrent or progressive acute on chronic PE"
          }
        Warning text:
          "Therapeutic heparin infusion is active for acute on
           chronic PE despite recent recurrent large-volume
           hemoptysis — competing risks of clot propagation /
           recurrent PE if held vs. ongoing airway bleeding if
           continued. If bleeding recurs after transfer, urgent
           reassessment of anticoagulation and IR escalation are
           required per ICU plan."

      High-dose immunosuppression + active infection (steroids /
      GNR bacteremia, conflict_status == yes):
        Phase-1 entry (typed):
          {
            "drug": "methylprednisolone 1 g IV daily",
            "indication": "biopsy-confirmed ANCA-associated vasculitis with pulmonary-renal involvement",
            "source_note_id": "<rheumatology_consult note_id>",
            "source_quote": "biopsy-confirmed ANCA-associated vasculitis with pulmonary-renal involvement",
            "conflict_status": "yes",
            "conflict_condition": "new gram-negative bacteremia with persistent fevers",
            "risk_of_continuing": "impaired host response, secondary opportunistic infection",
            "risk_of_holding_or_reducing": "vasculitis flare, end-organ injury (pulmonary hemorrhage, RPGN)"
          }
        Warning text:
          "Methylprednisolone 1 g IV daily is active for
           biopsy-confirmed ANCA-associated vasculitis with
           pulmonary-renal involvement, now in the setting of new
           gram-negative bacteremia and persistent fevers —
           competing risks of vasculitis flare and end-organ injury
           if steroids are held vs. impaired host response on
           continued high-dose immunosuppression. ID and
           rheumatology should jointly direct any dose modification
           per ICU plan."

      Indication-absent hedged form (conflict_status == yes,
      indication genuinely not documented in routed notes):
        Phase-1 entry (typed; HEDGE form):
          {
            "drug": "bivalirudin infusion",
            "indication": "indication not documented in available notes",
            "source_note_id": null,
            "source_quote": null,
            "conflict_status": "yes",
            "conflict_condition": "new large-volume GI bleeding requiring transfusion",
            "risk_of_continuing": "ongoing or worsening GI hemorrhage",
            "risk_of_holding_or_reducing": "clot propagation (magnitude uncertain — indication unknown)"
          }
        Warning text (dedicated-clause hedge, not parenthetical):
          "Therapeutic bivalirudin infusion is active in the setting
           of new large-volume GI bleeding — indication for
           bivalirudin not documented in available notes; competing
           risks framing therefore preliminary. Clarify indication
           with the prior team before any hold decision; GI / IR
           escalation pathway per ICU plan if bleeding worsens."

      Unclear-conflict hedged form (conflict_status == unclear):
        Phase-1 entry (typed):
          {
            "drug": "heparin gtt",
            "indication": "LV thrombus post-MI",
            "source_note_id": "<H&P note_id>",
            "source_quote": "LV thrombus post-MI on therapeutic heparin",
            "conflict_status": "unclear",
            "conflict_condition": "microhematuria on UA without overt bleeding source or hemodynamic change",
            "risk_of_continuing": "possible progression to overt GU bleeding",
            "risk_of_holding_or_reducing": "LV thrombus propagation, cerebral embolic risk"
          }
        Warning text:
          "Therapeutic heparin infusion is active for LV thrombus
           post-MI; microhematuria on recent UA — possible
           progression to overt GU bleeding if anticoagulation is
           continued vs. risk of LV thrombus propagation and
           cerebral embolic event if held. Repeat UA and
           urology/hematology input recommended before any
           hold decision."

    FAILURE PATTERN — explicit anti-pattern, do NOT emit:
      WRONG (one-sided continuation-risk framing, no indication,
      no trade-off arms — this is the original v1.4 failure mode):
        "Active therapeutic heparin infusion is ongoing in a
         patient with recent recurrent large-volume hemoptysis;
         recurrent bleeding requires immediate escalation and may
         require IR intervention per MICU note."
      This wording omits the PE indication (which is documented),
      omits the holding-risk arm (clot propagation / recurrent PE),
      and prescribes a one-sided escalation. If you would have
      written this, the COMPETING-RISKS SCOPE CHECK in Phase 1 was
      missed or incomplete — re-run the scope check and rewrite
      using the conflict == yes worked example above as your
      template.

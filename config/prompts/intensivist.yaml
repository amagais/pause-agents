  NEGATIVE EXAMPLE — DO NOT EMIT:

  Patient is a 75yo M with PMH HTN, HLD, T2DM, CKD, BPH,
  hypothyroidism, admitted for septic shock from urinary source.

    ``one_liner_pmh_selection``:
      - display: "HTN"                    # WRONG — not load-bearing
        rank: 1
      - display: "HLD"                    # WRONG — not load-bearing
        rank: 2
      - display: "T2DM"                   # WRONG — not load-bearing
        rank: 3

  Why this is wrong:
  1. None of HTN/HLD/T2DM shape the septic-shock differential,
     change management, or shape prognosis here. They are
     background cardiovascular/metabolic risk — paragraph-slot
     material.
  2. CKD would be load-bearing under criterion (a) — affects
     fluid resuscitation strategy and AKI-on-CKD interpretation.
     The correct emission here is `[{display: "CKD", rank: 1}]`,
     not the chart-order top-three.
  3. Emitting chart-order rather than load-bearing-selection is
     the failure mode the criterion explicitly forbids.


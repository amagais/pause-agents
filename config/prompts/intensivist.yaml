        "CONFLICT: [nurse] says hemodynamically stable vs [pharmacy] lists active norepinephrine. Source data confirms norepinephrine 0.05 mcg/kg/min active. RESOLUTION: patient is on low-dose vasopressor support, not fully hemodynamically stable."
      ],
